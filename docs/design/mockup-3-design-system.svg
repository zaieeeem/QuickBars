<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="sans-serif">
  <defs>
    <linearGradient id="amberFill3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB74D" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#FFA726" stop-opacity="0.32"/>
    </linearGradient>
    <clipPath id="anat"><rect x="80" y="140" width="480" height="96" rx="24"/></clipPath>
    <clipPath id="fs2"><rect x="80" y="520" width="250" height="56" rx="14"/></clipPath>
    <clipPath id="fs3"><rect x="350" y="520" width="250" height="56" rx="14"/></clipPath>
  </defs>

  <rect width="1280" height="720" fill="#14161c"/>
  <text x="60" y="70" fill="#ffffff" font-size="26" font-weight="700">QuickBars visual system</text>

  <!-- ===== TILE ANATOMY (1.5x scale) ===== -->
  <text x="80" y="120" fill="#ffffff" opacity="0.6" font-size="14" font-weight="600">TILE ANATOMY</text>
  <rect x="80" y="140" width="480" height="96" rx="24" fill="#23262e"/>
  <g clip-path="url(#anat)">
    <rect x="80" y="140" width="312" height="96" fill="url(#amberFill3)"/>
  </g>
  <circle cx="134" cy="188" r="30" fill="#FFB74D"/>
  <g stroke="#3E2723" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="134" cy="183" r="10.5"/>
    <line x1="128" y1="198" x2="140" y2="198"/>
    <line x1="129.5" y1="203.5" x2="138.5" y2="203.5"/>
  </g>
  <text x="180" y="182" fill="#ffffff" font-size="24" font-weight="600">Ceiling Light</text>
  <text x="180" y="212" fill="#ffffff" opacity="0.65" font-size="19">On &#183; 65%</text>
  <text x="475" y="196" fill="#ffffff" font-size="21" font-weight="700">65%</text>

  <!-- callouts -->
  <g stroke="#5C8DFF" stroke-width="1.2" fill="none">
    <line x1="134" y1="218" x2="134" y2="268"/>
    <line x1="392" y1="236" x2="392" y2="268"/>
    <line x1="560" y1="160" x2="610" y2="160"/>
    <line x1="500" y1="196" x2="610" y2="196" stroke-dasharray="3 3"/>
  </g>
  <text x="120" y="288" fill="#5C8DFF" font-size="13">44dp icon circle, domain accent when active</text>
  <text x="320" y="288" fill="#5C8DFF" font-size="13">value fill = live brightness/volume/position</text>
  <text x="618" y="164" fill="#5C8DFF" font-size="13">radius 16dp, surface #23262E @ 94%</text>
  <text x="618" y="200" fill="#5C8DFF" font-size="13">numeric state, always visible</text>

  <!-- ===== FOCUS STATES ===== -->
  <text x="80" y="380" fill="#ffffff" opacity="0.6" font-size="14" font-weight="600">FOCUS STATES &#8212; one treatment everywhere</text>

  <!-- rest -->
  <rect x="80" y="404" width="250" height="56" rx="14" fill="#23262e"/>
  <circle cx="110" cy="432" r="16" fill="#ffffff" fill-opacity="0.08"/>
  <text x="136" y="429" fill="#ffffff" font-size="14" font-weight="600">Rest</text>
  <text x="136" y="446" fill="#ffffff" opacity="0.45" font-size="11.5">no ring, 100% scale</text>

  <!-- focused -->
  <rect x="348.5" y="402.5" width="253" height="59" rx="15.5" fill="#23262e" stroke="#ffffff" stroke-width="2.5"/>
  <circle cx="380" cy="432" r="16" fill="#ffffff" fill-opacity="0.08"/>
  <text x="406" y="429" fill="#ffffff" font-size="14" font-weight="600">Focused</text>
  <text x="406" y="446" fill="#ffffff" opacity="0.45" font-size="11.5">2.5dp white ring + 1.03 scale</text>

  <!-- adjusting -->
  <rect x="78.5" y="518.5" width="253" height="59" rx="15.5" fill="#23262e" stroke="#ffffff" stroke-width="2.5"/>
  <g clip-path="url(#fs2)">
    <rect x="80" y="520" width="150" height="56" fill="url(#amberFill3)"/>
  </g>
  <circle cx="110" cy="548" r="16" fill="#FFB74D"/>
  <text x="136" y="545" fill="#ffffff" font-size="14" font-weight="600">Adjusting</text>
  <text x="136" y="562" fill="#ffffff" opacity="0.45" font-size="11.5">&#8249; &#8250; chevrons + value pulses</text>
  <text x="296" y="553" fill="#ffffff" font-size="15" font-weight="700">&#8249; &#8250;</text>

  <!-- disabled -->
  <rect x="350" y="520" width="250" height="56" rx="14" fill="#23262e" opacity="0.5"/>
  <circle cx="380" cy="548" r="16" fill="#ffffff" fill-opacity="0.05"/>
  <text x="406" y="545" fill="#ffffff" opacity="0.5" font-size="14" font-weight="600">Unavailable</text>
  <text x="406" y="562" fill="#ffffff" opacity="0.3" font-size="11.5">50% opacity, skipped by D-pad</text>

  <!-- ===== DOMAIN ACCENTS ===== -->
  <text x="700" y="380" fill="#ffffff" opacity="0.6" font-size="14" font-weight="600">DOMAIN ACCENTS (HA-familiar)</text>
  <g font-size="13" fill="#ffffff">
    <circle cx="716" cy="412" r="11" fill="#FFB74D"/><text x="738" y="417">Lights &#8212; #FFB74D</text>
    <circle cx="716" cy="448" r="11" fill="#FF7043"/><text x="738" y="453">Climate heat &#8212; #FF7043</text>
    <circle cx="716" cy="484" r="11" fill="#4FC3F7"/><text x="738" y="489">Climate cool &#8212; #4FC3F7</text>
    <circle cx="716" cy="520" r="11" fill="#BA68C8"/><text x="738" y="525">Media &#8212; #BA68C8</text>
    <circle cx="960" cy="412" r="11" fill="#81C784"/><text x="982" y="417">Locks / covers &#8212; #81C784</text>
    <circle cx="960" cy="448" r="11" fill="#E57373"/><text x="982" y="453">Alarm / alerts &#8212; #E57373</text>
    <circle cx="960" cy="484" r="11" fill="#90A4AE"/><text x="982" y="489">Scenes / scripts &#8212; #90A4AE</text>
    <circle cx="960" cy="520" r="11" fill="#ffffff" fill-opacity="0.15"/><text x="982" y="525">Off / idle &#8212; white @ 8&#8211;15%</text>
  </g>

  <!-- ===== REMOTE MAPPING ===== -->
  <text x="700" y="120" fill="#ffffff" opacity="0.6" font-size="14" font-weight="600">REMOTE MAPPING (vertical bar)</text>
  <g font-size="14" fill="#ffffff">
    <rect x="700" y="140" width="58" height="30" rx="8" fill="#ffffff" fill-opacity="0.1"/><text x="729" y="160" text-anchor="middle" font-weight="700">OK</text>
    <text x="772" y="160" opacity="0.75">toggle light / run scene / pause media</text>
    <rect x="700" y="182" width="58" height="30" rx="8" fill="#ffffff" fill-opacity="0.1"/><text x="729" y="202" text-anchor="middle" font-weight="700">&#8249; &#8250;</text>
    <text x="772" y="202" opacity="0.75">adjust value directly (hold = continuous ramp)</text>
    <rect x="700" y="224" width="58" height="30" rx="8" fill="#ffffff" fill-opacity="0.1"/><text x="729" y="244" text-anchor="middle" font-weight="700">&#9650;&#9660;</text>
    <text x="772" y="244" opacity="0.75">move between tiles</text>
    <rect x="700" y="266" width="58" height="30" rx="8" fill="#ffffff" fill-opacity="0.1"/><text x="729" y="286" text-anchor="middle" font-weight="700">hold</text>
    <text x="772" y="286" opacity="0.75">expand tile for warmth / color / modes</text>
    <rect x="700" y="308" width="58" height="30" rx="8" fill="#ffffff" fill-opacity="0.1"/><text x="729" y="328" text-anchor="middle" font-weight="700">back</text>
    <text x="772" y="328" opacity="0.75">collapse, then close bar (no close button)</text>
  </g>
  <text x="700" y="568" fill="#ffffff" opacity="0.45" font-size="12.5">Horizontal/bottom bars swap the axes: &#8249;&#8250; moves between tiles, &#9650;&#9660; adjusts.</text>

  <!-- footnote -->
  <text x="80" y="660" fill="#ffffff" opacity="0.4" font-size="12.5">Typography: 16sp name / 13sp state only. One focus ring spec shared by tiles, drawer, editors. Debounced sends reuse rememberDebouncedAction (Light.kt:148).</text>
</svg>
