<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="sans-serif">
  <defs>
    <radialGradient id="tvGlow2" cx="35%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1b2433"/>
      <stop offset="55%" stop-color="#0e1219"/>
      <stop offset="100%" stop-color="#07090d"/>
    </radialGradient>
    <linearGradient id="scrim2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="warmth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="50%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="amberFill2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB74D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFA726" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#tvGlow2)"/>
  <circle cx="380" cy="300" r="190" fill="#27405e" opacity="0.35"/>
  <circle cx="620" cy="480" r="150" fill="#5e3a27" opacity="0.25"/>
  <rect x="780" width="500" height="720" fill="url(#scrim2)"/>

  <!-- panel -->
  <rect x="920" y="40" width="320" height="640" rx="24" fill="#101319" fill-opacity="0.94" stroke="#ffffff" stroke-opacity="0.09" stroke-width="1.5"/>
  <text x="940" y="84" fill="#ffffff" font-size="19" font-weight="600">Living Room</text>

  <!-- ===== EXPANDED TILE : Ceiling Light (after long-press) ===== -->
  <rect x="938.5" y="102.5" width="283" height="235" rx="17.5" fill="#262a33" stroke="#ffffff" stroke-width="2.5"/>

  <!-- header row of expanded tile -->
  <circle cx="972" cy="134" r="18" fill="#FFB74D"/>
  <g stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="972" cy="131" r="6.5"/>
    <line x1="968.5" y1="140.5" x2="975.5" y2="140.5"/>
  </g>
  <text x="1000" y="131" fill="#ffffff" font-size="16" font-weight="600">Ceiling Light</text>
  <text x="1000" y="149" fill="#ffffff" opacity="0.6" font-size="12.5">On &#183; 65% &#183; 3200K</text>
  <!-- power chip -->
  <circle cx="1196" cy="134" r="14" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.3"/>
  <path d="M 1196,127 L 1196,134" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <path d="M 1191,130 A 7,7 0 1 0 1201,130" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ROW 1 : Brightness (focused row) -->
  <rect x="952" y="162" width="256" height="48" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-width="1.8"/>
  <text x="966" y="182" fill="#ffffff" font-size="12.5" font-weight="600" opacity="0.85">BRIGHTNESS</text>
  <rect x="966" y="190" width="200" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="966" y="190" width="130" height="8" rx="4" fill="url(#amberFill2)"/>
  <circle cx="1096" cy="194" r="8" fill="#ffffff"/>
  <text x="1196" y="199" text-anchor="end" fill="#ffffff" font-size="14" font-weight="700">65%</text>

  <!-- ROW 2 : Warmth -->
  <rect x="952" y="218" width="256" height="48" rx="12" fill="#ffffff" fill-opacity="0.04"/>
  <text x="966" y="238" fill="#ffffff" font-size="12.5" font-weight="600" opacity="0.6">WARMTH</text>
  <rect x="966" y="246" width="200" height="8" rx="4" fill="url(#warmth)"/>
  <circle cx="1026" cy="250" r="8" fill="#ffffff" stroke="#00000055"/>
  <text x="1196" y="255" text-anchor="end" fill="#ffffff" opacity="0.7" font-size="13" font-weight="600">3200K</text>

  <!-- ROW 3 : Color swatches -->
  <rect x="952" y="274" width="256" height="48" rx="12" fill="#ffffff" fill-opacity="0.04"/>
  <text x="966" y="294" fill="#ffffff" font-size="12.5" font-weight="600" opacity="0.6">COLOR</text>
  <circle cx="976" cy="308" r="9" fill="#FFFFFF"/>
  <circle cx="1004" cy="308" r="9" fill="#FF5252"/>
  <circle cx="1032" cy="308" r="9" fill="#FFB300"/>
  <circle cx="1060" cy="308" r="11" fill="#69F0AE" stroke="#ffffff" stroke-width="2"/>
  <circle cx="1088" cy="308" r="9" fill="#40C4FF"/>
  <circle cx="1116" cy="308" r="9" fill="#7C4DFF"/>
  <circle cx="1144" cy="308" r="9" fill="#F48FB1"/>
  <text x="1196" y="313" text-anchor="end" fill="#ffffff" opacity="0.5" font-size="12">custom&#8230;</text>

  <!-- other tiles, collapsed + dimmed -->
  <g opacity="0.35">
    <rect x="940" y="352" width="280" height="64" rx="16" fill="#23262e"/>
    <circle cx="972" cy="384" r="20" fill="#ffffff" fill-opacity="0.08"/>
    <text x="1002" y="380" fill="#ffffff" font-size="16" font-weight="600">Kitchen</text>
    <text x="1002" y="400" fill="#ffffff" opacity="0.45" font-size="13">Off</text>

    <rect x="940" y="428" width="280" height="64" rx="16" fill="#23262e"/>
    <circle cx="972" cy="460" r="20" fill="#FFB74D" fill-opacity="0.6"/>
    <text x="1002" y="456" fill="#ffffff" font-size="16" font-weight="600">Reading Lamp</text>
    <text x="1002" y="476" fill="#ffffff" opacity="0.45" font-size="13">On &#183; 30%</text>

    <rect x="940" y="504" width="280" height="64" rx="16" fill="#23262e"/>
    <circle cx="972" cy="536" r="20" fill="#FF7043" fill-opacity="0.6"/>
    <text x="1002" y="532" fill="#ffffff" font-size="16" font-weight="600">Thermostat</text>
    <text x="1002" y="552" fill="#ffffff" opacity="0.45" font-size="13">Heating &#183; set 21.5&#176;</text>

    <rect x="940" y="580" width="280" height="44" rx="16" fill="#23262e"/>
  </g>

  <!-- footer hints -->
  <line x1="940" y1="640" x2="1220" y2="640" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="1080" y="664" text-anchor="middle" fill="#ffffff" opacity="0.55" font-size="12.5">
    <tspan font-weight="700">&#9650; &#9660;</tspan> control&#160;&#160;&#160;<tspan font-weight="700">&#8249; &#8250;</tspan> adjust&#160;&#160;&#160;<tspan font-weight="700">back</tspan> done
  </text>

  <!-- caption -->
  <text x="60" y="80" fill="#ffffff" font-size="26" font-weight="700" opacity="0.92">Long-press: expand in place</text>
  <text x="60" y="112" fill="#ffffff" font-size="15" opacity="0.6">Hold OK on a tile to reveal secondary controls.</text>
  <text x="60" y="138" fill="#ffffff" font-size="15" opacity="0.6">&#9650;&#9660; moves between rows, &#8249;&#8250; drags the slider directly.</text>
  <text x="60" y="164" fill="#ffffff" font-size="15" opacity="0.6">No tabs, no +/&#8722; buttons, no close button to hunt for &#8212;</text>
  <text x="60" y="190" fill="#ffffff" font-size="15" opacity="0.6">BACK collapses the tile, BACK again closes the bar.</text>
</svg>
