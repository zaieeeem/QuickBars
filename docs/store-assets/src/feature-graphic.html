<style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box}
  .stage{
    width:1024px;height:500px;position:relative;overflow:hidden;
    background:#141821;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  /* warm focal glow, not a full-page gradient template */
  .glow{position:absolute;left:512px;top:250px;width:1200px;height:1200px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at center,
      rgba(255,183,77,0.16) 0%, rgba(255,183,77,0.06) 26%, rgba(20,24,33,0) 55%);}
  .vign{position:absolute;inset:0;
    background:radial-gradient(120% 120% at 50% 45%, rgba(20,24,33,0) 60%, rgba(8,10,14,0.85) 100%);}
  .center{position:absolute;left:0;right:0;top:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .bell{width:150px;height:150px;filter:drop-shadow(0 10px 26px rgba(255,160,60,0.35));margin-bottom:8px}
  .word{font-size:92px;font-weight:800;letter-spacing:-2px;color:#F5F6F8;line-height:1;
    text-shadow:0 2px 18px rgba(0,0,0,0.5)}
  .word .b2{color:#FFB74D}
  .tag{margin-top:16px;font-size:27px;font-weight:500;color:#C7CDD6;letter-spacing:.2px}
  /* quick-bar tile strip echoing the real app overlay */
  .bar{margin-top:30px;display:flex;gap:14px;padding:14px 16px;border-radius:20px;
    background:rgba(30,35,46,0.72);box-shadow:0 12px 40px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.04)}
  .tile{width:78px;height:78px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.35)}
  .on{background:linear-gradient(180deg,#FFC876,#FFB340)}
  .off{background:#2b3140;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05)}
  .tile svg{width:40px;height:40px}
</style>
<div class="stage">
  <div class="glow"></div>
  <div class="vign"></div>
  <div class="center">
    <svg class="bell" viewBox="0 0 96 80">
      <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FFCE85"/><stop offset="1" stop-color="#FFB240"/></linearGradient></defs>
      <path d="M30 8 A34 34 0 0 0 14 25" fill="none" stroke="#FFD9A0" stroke-width="6" stroke-linecap="round"/>
      <path d="M66 8 A34 34 0 0 1 82 25" fill="none" stroke="#FFD9A0" stroke-width="6" stroke-linecap="round"/>
      <path d="M45 27 h6 v8 h-6 Z" fill="url(#bg)"/>
      <path d="M48 20 m-6 0 a6 6 0 1 0 12 0 a6 6 0 1 0 -12 0" fill="url(#bg)"/>
      <path d="M22 57 A26 26 0 0 1 74 57 Z" fill="url(#bg)"/>
      <path d="M17 62 h62 a4.5 4.5 0 0 1 0 9 h-62 a4.5 4.5 0 0 1 0 -9 Z" fill="#FFD9A0"/>
    </svg>
    <div class="word">Bing<span class="b2">-</span>Bong</div>
    <div class="tag">Your Home Assistant — one button away on Android&nbsp;TV</div>
    <div class="bar">
      <div class="tile on"><svg viewBox="0 0 24 24" fill="#141821"><path d="M9 21h6v-1H9v1zm3-19a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg></div>
      <div class="tile on"><svg viewBox="0 0 24 24" fill="#141821"><path d="M12 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3z"/><circle cx="12" cy="12" r="2.4"/></svg></div>
      <div class="tile off"><svg viewBox="0 0 24 24" fill="#9AA3AF"><path d="M12 4c1.5 0 3 1.6 3 4 0 1.2-.7 2-1.7 2.6.9.3 1.7 1 1.7 2.4 0 2.4-1.5 4-3 4V4z"/><circle cx="12" cy="12" r="1.7" fill="#9AA3AF"/></svg></div>
      <div class="tile off"><svg viewBox="0 0 24 24" fill="#9AA3AF"><path d="M4 12a8 8 0 0 1 16 0h-2a6 6 0 0 0-12 0H4z"/><rect x="10.5" y="12" width="3" height="7" rx="1.2"/></svg></div>
    </div>
  </div>
</div>
