<style>
  html,body{margin:0;padding:0}
  *{box-sizing:border-box}
  .stage{width:1280px;height:720px;position:relative;overflow:hidden;background:#141821;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;gap:56px;}
  .glow{position:absolute;left:44%;top:50%;width:1300px;height:1300px;transform:translate(-50%,-50%);
    background:radial-gradient(circle at center,
      rgba(255,183,77,0.18) 0%, rgba(255,183,77,0.06) 28%, rgba(20,24,33,0) 56%);}
  .vign{position:absolute;inset:0;
    background:radial-gradient(120% 120% at 44% 50%, rgba(20,24,33,0) 62%, rgba(8,10,14,0.9) 100%);}
  .ring{position:relative;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle at 50% 42%, rgba(255,183,77,0.14), rgba(255,183,77,0.03) 70%, transparent 72%);
    box-shadow:inset 0 0 0 2px rgba(255,183,77,0.28);
    display:flex;align-items:center;justify-content:center;}
  .bell{width:190px;height:170px;filter:drop-shadow(0 12px 30px rgba(255,160,60,0.4))}
  .text{position:relative;display:flex;flex-direction:column;}
  .word{font-size:132px;font-weight:800;letter-spacing:-3px;color:#F5F6F8;line-height:.95}
  .word .b2{color:#FFB74D}
  .sub{margin-top:14px;font-size:40px;font-weight:500;color:#AEB6C1;letter-spacing:.3px}
</style>
<div class="stage">
  <div class="glow"></div>
  <div class="vign"></div>
  <div class="ring">
    <svg class="bell" viewBox="0 0 96 80">
      <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FFCE85"/><stop offset="1" stop-color="#FFB240"/></linearGradient></defs>
      <path d="M30 8 A34 34 0 0 0 14 25" fill="none" stroke="#FFD9A0" stroke-width="6" stroke-linecap="round"/>
      <path d="M66 8 A34 34 0 0 1 82 25" fill="none" stroke="#FFD9A0" stroke-width="6" stroke-linecap="round"/>
      <path d="M45 27 h6 v8 h-6 Z" fill="url(#bg)"/>
      <path d="M48 20 m-6 0 a6 6 0 1 0 12 0 a6 6 0 1 0 -12 0" fill="url(#bg)"/>
      <path d="M22 57 A26 26 0 0 1 74 57 Z" fill="url(#bg)"/>
      <path d="M17 62 h62 a4.5 4.5 0 0 1 0 9 h-62 a4.5 4.5 0 0 1 0 -9 Z" fill="#FFD9A0"/>
    </svg>
  </div>
  <div class="text">
    <div class="word">Bing<span class="b2">-</span>Bong</div>
    <div class="sub">Home Assistant quick bars for your TV</div>
  </div>
</div>
