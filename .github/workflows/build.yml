name: Build

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build signed release APK
        env:
          # Defaults match the committed CI keystore; define repository secrets
          # with the same names to switch to a private keystore.
          HA_QUICKBARS_KEYSTORE_PASSWORD: ${{ secrets.HA_QUICKBARS_KEYSTORE_PASSWORD || 'quickbars-ci' }}
          HA_QUICKBARS_KEY_ALIAS: ${{ secrets.HA_QUICKBARS_KEY_ALIAS || 'quickbars-ci' }}
          HA_QUICKBARS_KEY_PASSWORD: ${{ secrets.HA_QUICKBARS_KEY_PASSWORD || 'quickbars-ci' }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PHA_QUICKBARS_KEYSTORE_FILE="$GITHUB_WORKSPACE/.ci/quickbars-ci.jks"

      - uses: actions/upload-artifact@v4
        with:
          retention-days: 4
          name: bingbong-apk
          path: app/build/outputs/apk/release/*.apk
